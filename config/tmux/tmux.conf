# Make split keys better
unbind % 
unbind '"'
bind '\' split-window -h -c '#{pane_current_path}'           
bind '-' split-window -v -c '#{pane_current_path}'

# Quickly move through panes with ALT+Arrow Key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# r to reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"

# Automatically set the window title
set-window-option -g automatic-rename off

# activity notifications
setw -g monitor-activity on
setw -g visual-activity on

# Improve terminal colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer to 10000
set -g history-limit 10000

# Mouse mode
set -g mouse on

# Silence
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Status Bar
set -g status-bg "#22262D"
set -g status-fg "#c5c9c7"

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#22262D fg=#c5c9c7'
set -g status-left ''

set -g status-right '#[fg=#c5c9c7,bg=#22262D]#[fg=#090e13,bg=#c5c9c7] %d/%m #[fg=#8ea4a2,bg=#c5c9c7]#[fg=#090e13,bg=#8ea4a2] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=#090e13 bg=#8ea4a2 bold'
setw -g window-status-current-format ' #I#[fg=#22262D]:#[fg=#090e13]#W#[fg=#C93134]#F #[fg=#8ea4a2,bg=#22262D]'

setw -g window-status-style 'fg=#090e13 bg=#717C7C'
setw -g window-status-format ' #I#[fg=#090e13]:#[fg=#090e13]#W#[fg=#090e13]#F '




